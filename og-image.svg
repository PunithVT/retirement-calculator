<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1220"/>
      <stop offset="1" stop-color="#0f1a30"/>
    </linearGradient>
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#22c55e"/>
      <stop offset="1" stop-color="#0ea5e9"/>
    </linearGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#22c55e"/>
      <stop offset="0.55" stop-color="#0ea5e9"/>
      <stop offset="1" stop-color="#ef4444"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- glow -->
  <circle cx="950" cy="120" r="240" fill="#0ea5e9" opacity="0.15"/>
  <circle cx="180" cy="540" r="220" fill="#22c55e" opacity="0.15"/>

  <!-- logo -->
  <g transform="translate(80, 80)">
    <circle cx="28" cy="28" r="28" fill="url(#brand)"/>
    <path d="M14 36 L24 24 L32 30 L42 18" stroke="#fff" stroke-width="4.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <text x="160" y="118" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif" font-size="32" font-weight="700" fill="#e2e8f0">Retirement Calculator</text>

  <!-- headline -->
  <text x="80" y="280" font-family="ui-sans-serif, system-ui, sans-serif" font-size="78" font-weight="800" fill="#ffffff" letter-spacing="-2">Will your SIP or lumpsum</text>
  <text x="80" y="368" font-family="ui-sans-serif, system-ui, sans-serif" font-size="78" font-weight="800" fill="url(#brand)" letter-spacing="-2">last through retirement?</text>

  <!-- subline -->
  <text x="80" y="430" font-family="ui-sans-serif, system-ui, sans-serif" font-size="28" fill="#cbd5e1">Free · Private · Built for India · No sign-up</text>

  <!-- chart line -->
  <g transform="translate(80, 470)" fill="none" stroke-width="6" stroke-linecap="round" stroke-linejoin="round">
    <path d="M0 100 C 120 60, 220 40, 380 30 S 620 50, 760 80 S 980 130, 1040 130" stroke="url(#line)"/>
    <circle cx="0" cy="100" r="6" fill="#22c55e"/>
    <circle cx="500" cy="40" r="6" fill="#0ea5e9"/>
    <circle cx="1040" cy="130" r="6" fill="#ef4444"/>
  </g>

  <!-- footer -->
  <text x="80" y="600" font-family="ui-sans-serif, system-ui, sans-serif" font-size="20" fill="#94a3b8">punithvt.github.io/retirement-calculator</text>
</svg>
